<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司登記小幫手</title>
  <style>
    :root {
      --sidebar-bg: #1e293b;
      --sidebar-text: #e2e8f0;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --bg-color: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #334155;
      --text-sub: #64748b;
      --border: #e2e8f0;
      --danger-bg: #fee2e2;
      --danger-text: #991b1b;
      --success-bg: #dcfce7;
      --success-text: #166534;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      min-height: 100vh;
    }

    /* 側邊欄樣式 */
    .sidebar {
      width: 250px;
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .sidebar-header {
      padding: 20px;
      font-size: 1.25rem;
      font-weight: bold;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-links {
      list-style: none;
      padding: 0;
      margin: 0;
      flex: 1;
    }

    .nav-item {
      cursor: pointer;
      padding: 16px 20px;
      border-left: 4px solid transparent;
      transition: background 0.2s;
      font-size: 0.95rem;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.05);
    }

    .nav-item.active {
      background: rgba(255,255,255,0.1);
      border-left-color: var(--primary);
      color: white;
      font-weight: 500;
    }

    /* 主內容區域 */
    .main-content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      padding: 30px;
      min-height: 600px;
    }

    h2 {
      margin-top: 0;
      color: var(--text-main);
      border-bottom: 2px solid var(--bg-color);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 12px;
      font-size: 15px;
      border: 2px solid var(--border);
      border-radius: 8px;
      box-sizing: border-box;
      resize: vertical;
      font-family: monospace; /* 讓代碼對齊更好看 */
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: white;
      border: 1px solid var(--border);
      color: var(--text-sub);
    }
    .btn-secondary:hover { background: #f8fafc; color: var(--text-main); }

    .btn-success {
      background: #10b981;
      color: white;
    }
    .btn-success:hover { background: #059669; }

    /* 隱藏/顯示頁面 */
    .page-section {
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }
    .page-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Tool 1: Tags Style */
    .tag-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      background: #f3f4f6;
      color: #374151;
    }
    .tag.danger {
      background: var(--danger-bg);
      color: var(--danger-text);
      border: 1px solid #fca5a5;
    }
    .success-msg {
      color: var(--success-text);
      background: var(--success-bg);
      padding: 12px;
      border-radius: 6px;
      width: 100%;
      text-align: center;
    }

    /* Tool 2: Output Area */
    #convertOutput {
      background: #f8fafc;
      color: #334155;
      border: 1px solid var(--border);
    }

    /* RWD */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; }
      .nav-links { display: flex; overflow-x: auto; }
      .nav-item { white-space: nowrap; border-left: none; border-bottom: 4px solid transparent; }
      .nav-item.active { border-left: none; border-bottom-color: var(--primary); }
      .main-content { padding: 20px; }
      .container { padding: 20px; }
    }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-header">
      🏢 公司登記小幫手
    </div>
    <ul class="nav-links">
      <li class="nav-item active" onclick="switchTab('tab-converter')">📝 營業項目格式轉換</li>
      <li class="nav-item" onclick="switchTab('tab-address')">📍 地址必審篩選</li>
    </ul>
  </nav>

  <main class="main-content">
    <div class="container">
      
      <div id="tab-converter" class="page-section active">
        <h2>營業項目格式轉換器</h2>
        <p style="color: var(--text-sub); margin-bottom: 20px; font-size: 0.9rem;">
          功能：修正格式混亂的營業項目，支援 ZZ/EZ 等特殊代碼，自動分行。
        </p>

        <div class="form-group">
          <label>原始資料輸入：</label>
          <textarea id="convertInput" placeholder="直接貼上內容，例如：
007 E801010 室內裝潢業
010EZ99990其他工程業 (也可辨識)"></textarea>
        </div>

        <div class="btn-group">
          <button class="btn-primary" onclick="convertFormat()">轉換格式</button>
          <button class="btn-secondary" onclick="clearConvert()">清除</button>
        </div>

        <div class="form-group">
          <label>轉換結果：</label>
          <textarea id="convertOutput" readonly placeholder="結果將顯示於此..."></textarea>
        </div>
        
        <div class="btn-group">
          <button id="copyBtn" class="btn-success" onclick="copyResult()">📋 一鍵複製結果</button>
        </div>
      </div>

      <div id="tab-address" class="page-section">
        <h2>地址審查必審篩選</h2>
        <div class="form-group">
          <label>請貼上「營業項目清單」：</label>
          <textarea id="addressInput" placeholder="例：&#10;J702050 舞廳業&#10;F501060 餐館業"></textarea>
        </div>
        <div class="btn-group">
          <button class="btn-primary" onclick="filterAddress()">開始篩選</button>
          <button class="btn-secondary" onclick="clearAddress()">清除</button>
        </div>
        
        <div class="form-group">
          <label>篩選結果：</label>
          <ul id="addressResult" class="tag-list">
            <li style="color: var(--text-sub);">尚未篩選...</li>
          </ul>
        </div>
        
        <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 15px;">
          <label style="color: var(--text-sub); font-size: 0.9rem;">📚 資料庫包含：舞廳、餐館、健身房、汽車修理等30項敏感行業</label>
        </div>
      </div>

    </div>
  </main>

  <script>
    /* ================= 頁面切換邏輯 ================= */
    function switchTab(tabId) {
      document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      const activeNav = tabId === 'tab-converter' ? 0 : 1;
      document.querySelectorAll('.nav-item')[activeNav].classList.add('active');
    }

    /* ================= 功能 1: 格式轉換邏輯 (修復版) ================= */
    function convertFormat() {
      const input = document.getElementById('convertInput').value; 
      
      // *** 核心修復 ***
      // [A-Z]{1,2}\d{5,6} : 支援 1或2個英文字母 + 5或6個數字 (涵蓋 F123456 與 ZZ99999)
      // (?:\d{1,4}\s*)?   : 允許數字跟代碼之間「沒有空白」的情況 (解決黏在一起的問題)
      const pattern = /(?:(\d{1,4})\s*)?([A-Z]{1,2}\d{5,6})\s+([\s\S]+?)(?=\s*(?:(?:\d{1,4}\s*)?[A-Z]{1,2}\d{5,6})|$)/g;
      
      let match;
      let result = '';
      let autoIndex = 1;

      while ((match = pattern.exec(input)) !== null) {
        let seq = match[1];
        let code = match[2];
        let name = match[3];

        // 清理名稱：移除中間的換行符號和多餘空白
        name = name.replace(/[\r\n]+/g, '').trim();
        
        // 序號處理
        let displaySeq;
        if (seq) {
            displaySeq = seq.padStart(3, '0');
        } else {
            displaySeq = String(autoIndex).padStart(3, '0');
            autoIndex++;
        }

        result += `${displaySeq} ${code} ${name}\n`;
      }

      const outputEl = document.getElementById('convertOutput');
      if (result) {
        outputEl.value = result;
      } else {
        if (input.trim()) {
            outputEl.value = '⚠️ 轉換失敗：未偵測到標準代碼。\n請確認內容是否包含類似 F102170 或 ZZ99999 的編號。';
        } else {
            outputEl.value = '';
        }
      }
    }

    function clearConvert() {
      document.getElementById('convertInput').value = '';
      document.getElementById('convertOutput').value = '';
    }

    function copyResult() {
      const outputEl = document.getElementById('convertOutput');
      if (!outputEl.value || outputEl.value.startsWith('⚠️')) {
        alert("沒有可複製的內容！");
        return;
      }
      outputEl.select();
      outputEl.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(outputEl.value).then(() => {
        const btn = document.getElementById('copyBtn');
        const originalText = btn.textContent;
        btn.textContent = '✅ 已複製！';
        btn.style.backgroundColor = '#059669';
        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.backgroundColor = '';
        }, 2000);
      });
    }

    /* ================= 功能 2: 地址審查邏輯 ================= */
    const mandatory = [
      'J702050 舞廳業','J702060 舞場業','J702070 酒家業','J702080 酒吧業',
      'J702030 特種咖啡茶室業','J701030 視聽歌唱業','JZ99020 三溫暖業','J702090 夜店業',
      'J701010 電子遊戲場業','J701070 資訊休閒業','F299010 成人用品零售業',
      'F501050 飲酒店業','F501060 餐館業','F501990 其他餐飲業',
      'JF01020 按摩業','JF01030 腳底按摩業','JF01010 傳統整復推拿業','JZ99110 瘦身美容業',
      'J801030 競技及休閒運動場館業','J802010 運動訓練業',
      'JA01010 汽車修理業','JA02020 機車修理業','F214030 汽、機車零件配備零售業','JA01990 其他汽車服務業',
      'J701020 遊樂園業','JI01010 互動式情境體驗服務業','I301050 實境體感應用服務業','J701040 休閒活動場館業',
      'JZ99180 寵物美容服務業','F206050 寵物食品及其用品零售業','H703120 自助儲物空間業'
    ];

    function filterAddress() {
      const input = document.getElementById('addressInput').value.trim();
      const resUl = document.getElementById('addressResult');
      
      if (!input) { alert("請輸入內容"); return; }

      const lines = input.split(/\r?\n|,/).map(s => s.trim()).filter(s => s);
      const matched = lines.filter(line =>
        mandatory.some(m => line.includes(m.split(' ')[0]))
      );

      resUl.innerHTML = '';
      if (matched.length) {
        matched.forEach(m => {
          const li = document.createElement('li');
          li.className = 'tag danger';
          li.textContent = `⚠️ ${m}`;
          resUl.appendChild(li);
        });
      } else {
        const li = document.createElement('li');
        li.className = 'success-msg';
        li.textContent = '✅ 未發現需必審項目';
        resUl.appendChild(li);
      }
    }

    function clearAddress() {
      document.getElementById('addressInput').value = '';
      document.getElementById('addressResult').innerHTML = '<li style="color: var(--text-sub);">尚未篩選...</li>';
    }
  </script>
</body>
</html>
